[[permission]]
identifier = "allow-app-commands"
description = "Allow gzTau desktop shell commands (instances, chrome, window helpers)"
commands.allow = [
  "list_tau_instances",
  "get_active_port",
  "open_instance",
  "window_minimize",
  "window_toggle_maximize",
  "window_close",
  "set_theme_chrome",
  "sync_taskbar_icon"
]
